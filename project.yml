name: LiftTracker
options:
  bundleIdPrefix: com.norman
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "5"
    GENERATE_INFOPLIST_FILE: YES
    SWIFT_VERSION: "5.0"
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
    INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
    DEVELOPMENT_TEAM: DZRPJF9JB6
    CODE_SIGN_STYLE: Automatic
targets:
  LiftTracker:
    type: application
    platform: iOS
    sources:
      - path: LiftTracker
      - path: Shared
    dependencies:
      - target: RestTimerWidget
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.norman.LiftTracker
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_KEY_NSSupportsLiveActivities: YES
        INFOPLIST_KEY_CFBundleDisplayName: LiftTracker
        ENABLE_TESTABILITY: YES
  RestTimerWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: RestTimerWidget
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.norman.LiftTracker.RestTimerWidget
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: RestTimerWidget/Info.plist
        GENERATE_INFOPLIST_FILE: YES
  LiftTrackerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: LiftTrackerTests
    dependencies:
      - target: LiftTracker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.norman.LiftTrackerTests
        GENERATE_INFOPLIST_FILE: YES
  LiftTrackerUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: LiftTrackerUITests
    dependencies:
      - target: LiftTracker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.norman.LiftTrackerUITests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: LiftTracker
schemes:
  LiftTracker:
    build:
      targets:
        LiftTracker: all
    test:
      targets:
        - LiftTrackerTests
        - LiftTrackerUITests
